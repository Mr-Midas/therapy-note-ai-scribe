<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TherapyNote AI Scribe</title>
  <style>
    :root[data-theme="light"] {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e9ecef;
      --text-primary: #212529;
      --text-secondary: #495057;
      --text-muted: #6c757d;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #dbeafe;
      --border: #dee2e6;
      --border-focus: #93c5fd;
      --shadow: rgba(0, 0, 0, 0.08);
      --shadow-lg: rgba(0, 0, 0, 0.12);
      --success: #16a34a;
      --success-bg: #dcfce7;
      --error: #dc2626;
      --error-bg: #fee2e2;
      --spinner-color: #2563eb;
      --scrollbar-track: #e9ecef;
      --scrollbar-thumb: #adb5bd;
    }

    :root[data-theme="dark"] {
      --bg-primary: #111827;
      --bg-secondary: #1f2937;
      --bg-tertiary: #374151;
      --text-primary: #f9fafb;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-light: #1e3a5f;
      --border: #374151;
      --border-focus: #60a5fa;
      --shadow: rgba(0, 0, 0, 0.3);
      --shadow-lg: rgba(0, 0, 0, 0.5);
      --success: #22c55e;
      --success-bg: #14532d;
      --error: #ef4444;
      --error-bg: #7f1d1d;
      --spinner-color: #60a5fa;
      --scrollbar-track: #374151;
      --scrollbar-thumb: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.2s, color 0.2s;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 3px;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 20px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .theme-toggle {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .theme-toggle:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }

    .input-section {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    textarea::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--shadow-lg);
    }

    .btn-secondary {
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      flex: 0 0 auto;
      padding: 10px 14px;
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn-primary.loading .spinner {
      display: block;
    }

    .btn-primary.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .output-section {
      display: none;
      margin-bottom: 14px;
    }

    .output-section.visible {
      display: block;
    }

    .output-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .output-textarea {
      width: 100%;
      min-height: 180px;
      padding: 12px;
      border: 1.5px solid var(--success);
      border-radius: 10px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12.5px;
      line-height: 1.55;
      resize: vertical;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      white-space: pre-wrap;
      overflow-y: auto;
    }

    .output-textarea:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
    }

    .copy-btn {
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .copy-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .copy-btn.copied {
      background: var(--text-muted);
    }

    .status-bar {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .status-bar.visible {
      display: flex;
    }

    .status-bar.error {
      background-color: var(--error-bg);
      color: var(--error);
      border: 1px solid var(--error);
    }

    .status-bar.success {
      background-color: var(--success-bg);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .footer {
      text-align: center;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
    }

    .footer .privacy-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-tertiary);
      padding: 3px 8px;
      border-radius: 6px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="logo">📋</span>
        <div>
          <div class="title">TherapyNote AI Scribe</div>
          <div class="subtitle">HIPAA-Compliant Documentation</div>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <div class="input-section">
      <label class="label" for="rawNotes">Your Raw Notes</label>
      <textarea
        id="rawNotes"
        placeholder="Enter your shorthand or dictated notes here...&#10;&#10;Example: Pt had R knee pain 6/10, did balance exercises, worked on stairs with railing..."
        spellcheck="false"
      ></textarea>
    </div>

    <div class="button-row">
      <button class="btn btn-primary" id="generateBtn">
        <span class="spinner"></span>
        <span class="btn-text">⚡ Generate Compliant Note</span>
      </button>
      <button class="btn btn-secondary" id="clearBtn" title="Clear all">Clear</button>
    </div>

    <div class="output-section" id="outputSection">
      <div class="output-label">
        <label class="label" for="outputNotes">Generated SOAP Note</label>
        <button class="copy-btn" id="copyBtn">📋 Copy</button>
      </div>
      <textarea
        class="output-textarea"
        id="outputNotes"
        readonly
        spellcheck="false"
      ></textarea>
    </div>

    <div class="footer">
      <div>TherapyNote AI Scribe v1.0</div>
      <div class="privacy-badge">🔒 100% Local &amp; Private — Powered by Ollama</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
